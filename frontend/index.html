<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Resume Job Match Assistant</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="container">
    <h1>AI Resume Job Match Assistant</h1>
    <p>Upload your resume and paste a job description to get an ATS-style match score.</p>

    <div class="card">
      <label>Upload Resume PDF</label>
      <input type="file" id="resumeFile" accept=".pdf" />

      <label>Job Description</label>
      <textarea id="jobText" placeholder="Paste job description here..."></textarea>

      <button id="analyzeBtn">Analyze Resume</button>
    </div>

    <div id="results" class="results hidden">
      <h2>Resume Analysis</h2>

      <div class="score-section">
        <canvas id="scoreChart" width="220" height="220"></canvas>

        <div class="score-details">
          <div class="score-card">
            <h3>Overall Match</h3>
            <div class="progress"><div id="overallBar" class="progress-fill"></div></div>
            <p id="overallScore">0%</p>
          </div>

          <div class="score-card">
            <h3>Skill Match</h3>
            <div class="progress"><div id="skillBar" class="progress-fill"></div></div>
            <p id="skillMatch">0%</p>
          </div>

          <div class="score-card">
            <h3>Semantic Match</h3>
            <div class="progress"><div id="semanticBar" class="progress-fill"></div></div>
            <p id="semanticMatch">0%</p>
          </div>
        </div>
      </div>

      <h3>✅ Matched Skills</h3>
      <ul id="matchedSkills"></ul>

      <h3>❌ Missing Skills</h3>
      <ul id="missingSkills"></ul>

      <h3>💡 Suggestions</h3>
      <ul id="suggestions"></ul>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
